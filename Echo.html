<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Profile Settings</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<h1 class="echo">ECHO</h1>
  <h2>Student Profile Settings</h2>

  <!-- Personal Information -->
  <div class="card">
    <h3>Manage your Personal Information</h3>

    <label>Full Name</label>
    <input type="text" placeholder="Enter full name">

    <label>Email</label>
    <input type="email" placeholder="Enter email">

    <label>School Email</label>
    <input type="text" placeholder="Enter school email">

    <label>Gender</label>
    <select>
      <option>Select</option>
      <option>Male</option>
      <option>Female</option>
    </select>

    <label>Phone Number</label>
    <input type="tel" placeholder="Enter phone number">
  </div>

  <!-- Academic Information -->
  <div class="card">
    <h3>Academic Information</h3>

    <label>Academic Level</label>
    <select>
      <option>Select</option>
      <option>Junior Secondary</option>
      <option>Senior Secondary</option>
    </select>

    <label>Class</label>
    <input type="text" placeholder="e.g JSS 2, SS 1">
  </div>

  <!-- Navigation Buttons -->
  <div class="buttons">
    <a href="login.html">👤 Account</a>
    <a href="notification.html">🔔 Notifications</a>
    <a href="security.html">🔐 Security</a>
    <a href="status.html">📌 Status</a>
    <a href="login.html" class="logout">🚪 Logout</a>
  </div>

</div>

</body>
</html>
<style>
  * {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}
.echo{color: blue;}
body {
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
}

.container {
  max-width: 500px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 15px;
}

.card {
  background: #fff;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

label {
  display: block;
  margin-top: 10px;
  font-size: 14px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.buttons a {
  text-decoration: none;
  background: #007bff;
  color: white;
  padding: 12px;
  text-align: center;
  border-radius: 10px;
  font-size: 14px;
  transition: 0.3s;
}

.buttons a:hover {
  background: #0056b3;
}

.logout {
  background: #dc3545;
}

.logout:hover {
  background: #b52a37;
}
</style>
